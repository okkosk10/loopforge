<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LoopForge Sprite Sheet Generator</title>
  <style>
    body {
      background: #0f0a1e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      margin: 0;
      padding: 32px;
      font-family: 'Segoe UI', sans-serif;
      color: #c4b5fd;
      gap: 24px;
    }
    h1 { color: #a78bfa; margin: 0; letter-spacing: 2px; font-size: 1.4rem; }
    p  { margin: 0; font-size: 0.85rem; color: #7c6fa0; }
    canvas {
      border: 1px solid #3b1f6b;
      border-radius: 8px;
      image-rendering: pixelated;
      max-width: 100%;
    }
    button {
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 32px;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .meta { font-size: 0.75rem; color: #4c3d70; }
  </style>
</head>
<body>
  <h1>LoopForge — Mascot Sprite Sheet</h1>
  <p>4 × 4 grid · 16 frames · 1024 × 1024 px · transparent background</p>
  <canvas id="sheet"></canvas>
  <button id="dl">Download sprite sheet PNG</button>
  <div class="meta">loopforge-mascot-spritesheet.png</div>

<script>
/* ──────────────── CONSTANTS ──────────────── */
const FS   = 256;          // frame size (px)
const COLS = 4;
const ROWS = 4;
const N    = 16;           // total frames

const C = {
  skin:       '#ffd4a8',
  skinShadow: '#f0a876',
  hair:       '#8b5cf6',
  hairLight:  '#c4b5fd',
  hairDark:   '#5b21b6',
  outfit:     '#2d1b4e',
  outfitMid:  '#3b2568',
  outfitEdge: '#1e0f35',
  belt:       '#06b6d4',
  beltGlow:   '#67e8f9',
  eye:        '#1e1b2e',
  eyeShine:   '#ffffff',
  cheek:      'rgba(255,150,150,0.35)',
  mouth:      '#e07a8c',
  boot:       '#1e0f35',
  bootTrim:   '#06b6d4',
  spark1:     '#f97316',
  spark2:     '#fbbf24',
  cyanAura:   'rgba(6,182,212,0.12)',
  white:      '#ffffff',
};

/* ──────────────── CANVAS SETUP ──────────────── */
const canvas = document.getElementById('sheet');
canvas.width  = FS * COLS;
canvas.height = FS * ROWS;
const ctx = canvas.getContext('2d');
ctx.clearRect(0, 0, canvas.width, canvas.height);

/* ──────────────── MATH HELPERS ──────────────── */
const TAU  = Math.PI * 2;
const sin  = (t) => Math.sin(t * TAU);
const cos  = (t) => Math.cos(t * TAU);
const lerp = (a, b, t) => a + (b - a) * t;
const ease = (t) => t < 0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;

/* ──────────────── PER-FRAME PARAMETERS ──────────────── */
function frameParams(i) {
  const t       = i / N;
  const ts      = sin(t);
  const blink   = (i === 6 || i === 7);
  const squashX = 1 + Math.abs(ts) * 0.04;
  const squashY = 1 - Math.abs(ts) * 0.04;

  return {
    t,
    bounceY:    ts * -7,
    squashX,
    squashY,
    armL:       ts *  8,
    armR:       ts * -8,
    earBobL:    sin(t + 0.05) * -3,
    earBobR:    sin(t - 0.05) * -3,
    tailWag:    ts * 12,
    sparkRot:   t,
    sparkScale: 0.7 + Math.abs(ts) * 0.6,
    blink,
    eyeSquint:  blink ? 0 : (i === 5 || i === 8 ? 0.6 : 1),
    shadowScale: squashX,
  };
}

/* ──────────────── DRAWING HELPERS ──────────────── */
function ellipse(x, y, rx, ry, color, angle=0) {
  ctx.save();
  ctx.translate(x, y);
  if (angle) ctx.rotate(angle);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(0, 0, rx, ry, 0, 0, TAU);
  ctx.fill();
  ctx.restore();
}

function radialGlow(x, y, r, colorInner, colorOuter) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, colorInner);
  g.addColorStop(1, colorOuter);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, TAU);
  ctx.fill();
}

function star(x, y, r1, r2, pts, color, rot=0) {
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let k = 0; k < pts * 2; k++) {
    const angle = (k * Math.PI / pts) + rot;
    const r = k % 2 === 0 ? r1 : r2;
    k === 0
      ? ctx.moveTo(x + Math.cos(angle) * r, y + Math.sin(angle) * r)
      : ctx.lineTo(x + Math.cos(angle) * r, y + Math.sin(angle) * r);
  }
  ctx.closePath();
  ctx.fill();
}

/* ──────────────── DRAW ONE FRAME ──────────────── */
function drawFrame(frameIndex) {
  const col  = frameIndex % COLS;
  const row  = Math.floor(frameIndex / COLS);
  const ox   = col * FS;
  const oy   = row * FS;

  const p    = frameParams(frameIndex);
  const cx   = ox + FS / 2;
  /* character anchor: center slightly above frame center */
  const cy   = oy + FS / 2 + 20 + p.bounceY;

  ctx.save();
  ctx.beginPath();
  ctx.rect(ox, oy, FS, FS);
  ctx.clip();

  /* ── AURA / ambient glow ── */
  radialGlow(cx, cy - 10, 90, C.cyanAura, 'rgba(6,182,212,0)');

  /* ── GROUND SHADOW ── */
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#06b6d4';
  ctx.beginPath();
  ctx.ellipse(cx, oy + FS - 28, 36 * p.shadowScale, 7, 0, 0, TAU);
  ctx.fill();
  ctx.restore();

  /* ── LEGS & BOOTS ── */
  const legOff = 14;
  // legs
  ellipse(cx - legOff, cy + 56, 10, 14, C.outfitMid);
  ellipse(cx + legOff, cy + 56, 10, 14, C.outfitMid);
  // boot body
  ellipse(cx - legOff, cy + 68, 13, 10, C.boot);
  ellipse(cx + legOff, cy + 68, 13, 10, C.boot);
  // boot toe
  ellipse(cx - legOff - 2, cy + 71, 10, 7, C.boot);
  ellipse(cx + legOff + 2, cy + 71, 10, 7, C.boot);
  // boot trim cyan
  ctx.fillStyle = C.belt;
  ctx.fillRect(cx - legOff - 12, cy + 62, 24, 3);
  ctx.fillRect(cx + legOff - 12, cy + 62, 24, 3);

  /* ── TAIL (behind body) ── */
  ctx.save();
  ctx.translate(cx + 28, cy + 30);
  ctx.rotate((p.tailWag * Math.PI) / 180);
  // tail base to tip gradient
  const tg = ctx.createLinearGradient(0, 0, 20, -20);
  tg.addColorStop(0, C.hair);
  tg.addColorStop(1, C.hairLight);
  ctx.fillStyle = tg;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(18, -10, 24, -28);
  ctx.quadraticCurveTo(28, -30, 16, -26);
  ctx.quadraticCurveTo(10, -8, -6, 4);
  ctx.closePath();
  ctx.fill();
  // tail tip
  ellipse(24, -28, 7, 7, C.hairLight);
  ctx.restore();

  /* ── BODY ── */
  ctx.save();
  ctx.translate(cx, cy + 32);
  ctx.scale(p.squashX, p.squashY);
  // body base
  const bodyGrad = ctx.createLinearGradient(-28, -20, 28, 20);
  bodyGrad.addColorStop(0, C.outfitMid);
  bodyGrad.addColorStop(0.5, C.outfit);
  bodyGrad.addColorStop(1, C.outfitEdge);
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, 0, 30, 28, 0, 0, TAU);
  ctx.fill();
  // collar cyan accent
  ctx.fillStyle = C.belt;
  ctx.beginPath();
  ctx.moveTo(-12, -26);
  ctx.lineTo(0, -20);
  ctx.lineTo(12, -26);
  ctx.lineTo(10, -20);
  ctx.lineTo(0, -14);
  ctx.lineTo(-10, -20);
  ctx.closePath();
  ctx.fill();
  // belt
  ctx.fillStyle = C.belt;
  ctx.fillRect(-28, 6, 56, 5);
  // belt buckle
  const bg2 = ctx.createRadialGradient(0, 8, 0, 0, 8, 7);
  bg2.addColorStop(0, C.beltGlow);
  bg2.addColorStop(1, C.belt);
  ctx.fillStyle = bg2;
  ctx.beginPath();
  ctx.roundRect(-7, 4, 14, 9, 3);
  ctx.fill();
  ctx.restore();

  /* ── ARMS ── */
  function drawArm(side) {
    const sx   = cx + side * 30;
    const sy   = cy + 10;
    const ang  = (side === -1 ? p.armL : p.armR) * Math.PI / 180;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(ang);
    // upper arm
    const ag = ctx.createLinearGradient(0, -8, 0, 22);
    ag.addColorStop(0, C.outfitMid);
    ag.addColorStop(1, C.outfit);
    ctx.fillStyle = ag;
    ctx.beginPath();
    ctx.ellipse(0, 8, 9, 16, 0, 0, TAU);
    ctx.fill();
    // cuff
    ctx.fillStyle = C.belt;
    ctx.fillRect(-9, 18, 18, 4);
    // hand
    ellipse(0, 28, 8, 8, C.skin);
    ellipse(side * -4, 26, 5, 5, C.skin);
    ctx.restore();
  }
  drawArm(-1);
  drawArm(1);

  /* ── HEAD ── */
  const headY = cy - 36;

  // head base
  const headGrad = ctx.createRadialGradient(cx - 6, headY - 6, 2, cx, headY, 28);
  headGrad.addColorStop(0, '#ffe0b8');
  headGrad.addColorStop(0.7, C.skin);
  headGrad.addColorStop(1, C.skinShadow);
  ctx.fillStyle = headGrad;
  ctx.beginPath();
  ctx.ellipse(cx, headY, 28, 26, 0, 0, TAU);
  ctx.fill();

  /* ── EARS ── */
  function drawEar(side) {
    const ex = cx + side * 22;
    const ey = headY - 22 + (side === -1 ? p.earBobL : p.earBobR);
    // outer ear
    ctx.save();
    ctx.translate(ex, ey);
    ctx.rotate(side * 0.15);
    ctx.fillStyle = C.hair;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(side * -8, -22);
    ctx.lineTo(side * 8, -22);
    ctx.closePath();
    ctx.fill();
    // inner pink
    ctx.fillStyle = '#f9a8d4';
    ctx.beginPath();
    ctx.moveTo(0, -2);
    ctx.lineTo(side * -4, -16);
    ctx.lineTo(side * 4, -16);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
  drawEar(-1);
  drawEar(1);

  /* ── HAIR ── */
  // back hair blob
  ctx.fillStyle = C.hairDark;
  ctx.beginPath();
  ctx.ellipse(cx, headY - 8, 30, 20, 0, 0, TAU);
  ctx.fill();
  // main hair cap
  const hg = ctx.createLinearGradient(cx - 30, headY - 28, cx + 20, headY + 5);
  hg.addColorStop(0, C.hairLight);
  hg.addColorStop(0.5, C.hair);
  hg.addColorStop(1, C.hairDark);
  ctx.fillStyle = hg;
  ctx.beginPath();
  ctx.ellipse(cx, headY - 6, 28, 18, 0, Math.PI, TAU);
  ctx.fill();
  // side hair tuft left
  ctx.fillStyle = C.hair;
  ctx.beginPath();
  ctx.ellipse(cx - 24, headY + 4, 8, 14, -0.3, 0, TAU);
  ctx.fill();
  // side hair tuft right
  ctx.beginPath();
  ctx.ellipse(cx + 24, headY + 4, 8, 14, 0.3, 0, TAU);
  ctx.fill();
  // fringe bangs
  ctx.fillStyle = C.hairLight;
  ctx.beginPath();
  ctx.ellipse(cx - 10, headY - 22, 10, 7, -0.25, 0, TAU);
  ctx.fill();
  ctx.fillStyle = C.hair;
  ctx.beginPath();
  ctx.ellipse(cx + 6, headY - 24, 9, 6, 0.2, 0, TAU);
  ctx.fill();

  /* ── EYES ── */
  if (!p.blink) {
    const eyeH = p.eyeSquint;
    // whites
    ellipse(cx - 9, headY - 3, 8, 9 * eyeH, '#f0e8ff');
    ellipse(cx + 9, headY - 3, 8, 9 * eyeH, '#f0e8ff');
    // iris gradient
    function drawIris(ix, iy) {
      const ig = ctx.createRadialGradient(ix, iy - 2, 0, ix, iy, 6);
      ig.addColorStop(0, '#8b5cf6');
      ig.addColorStop(0.5, '#5b21b6');
      ig.addColorStop(1, '#1e1b2e');
      ellipse(ix, iy, 6, 7 * eyeH, ig);
    }
    drawIris(cx - 9, headY - 2);
    drawIris(cx + 9, headY - 2);
    // pupils
    ellipse(cx - 9, headY - 1, 3, 4 * eyeH, C.eye);
    ellipse(cx + 9, headY - 1, 3, 4 * eyeH, C.eye);
    // shine
    ellipse(cx - 6, headY - 5, 2.5, 2.5, C.white);
    ellipse(cx + 12, headY - 5, 2.5, 2.5, C.white);
    ellipse(cx - 11, headY, 1.5, 1.5, 'rgba(255,255,255,0.5)');
    ellipse(cx + 7, headY, 1.5, 1.5, 'rgba(255,255,255,0.5)');
    // lashes top
    ctx.strokeStyle = C.eye;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx - 17, headY - 8 * eyeH); ctx.lineTo(cx - 14, headY - 11 * eyeH);
    ctx.moveTo(cx - 9,  headY - 9 * eyeH); ctx.lineTo(cx - 9,  headY - 13 * eyeH);
    ctx.moveTo(cx - 2,  headY - 8 * eyeH); ctx.lineTo(cx + 1,  headY - 11 * eyeH);
    ctx.moveTo(cx + 2,  headY - 8 * eyeH); ctx.lineTo(cx - 1,  headY - 11 * eyeH);
    ctx.moveTo(cx + 9,  headY - 9 * eyeH); ctx.lineTo(cx + 9,  headY - 13 * eyeH);
    ctx.moveTo(cx + 17, headY - 8 * eyeH); ctx.lineTo(cx + 20, headY - 11 * eyeH);
    ctx.stroke();
  } else {
    // closed eyes (blink)
    ctx.strokeStyle = C.hairDark;
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(cx - 9, headY - 1, 7, Math.PI * 1.1, Math.PI * 1.9);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx + 9, headY - 1, 7, Math.PI * 1.1, Math.PI * 1.9);
    ctx.stroke();
    // happy squint lashes
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx - 15, headY - 4); ctx.lineTo(cx - 13, headY - 8);
    ctx.moveTo(cx + 3,  headY - 4); ctx.lineTo(cx + 5,  headY - 8);
    ctx.stroke();
  }

  /* ── CHEEKS ── */
  ellipse(cx - 20, headY + 6, 8, 5, C.cheek);
  ellipse(cx + 20, headY + 6, 8, 5, C.cheek);

  /* ── MOUTH ── */
  ctx.strokeStyle = C.mouth;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(cx, headY + 12, 6, 0, Math.PI);
  ctx.stroke();
  // mouth corners
  ctx.beginPath();
  ctx.moveTo(cx - 6, headY + 12); ctx.lineTo(cx - 8, headY + 10);
  ctx.moveTo(cx + 6, headY + 12); ctx.lineTo(cx + 8, headY + 10);
  ctx.stroke();

  /* ── HAIR STRAND DETAIL ── */
  ctx.strokeStyle = C.hairLight;
  ctx.lineWidth = 1.2;
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.moveTo(cx + 4, headY - 26);
  ctx.quadraticCurveTo(cx + 14, headY - 16, cx + 10, headY - 2);
  ctx.stroke();
  ctx.globalAlpha = 1;

  /* ── SPARK EFFECTS ── */
  const numSparks = 4;
  for (let k = 0; k < numSparks; k++) {
    const baseAngle = (k / numSparks) + p.sparkRot;
    const dist      = 52 + Math.sin((baseAngle + p.t) * TAU * 1.5) * 12;
    const sx        = cx + Math.cos(baseAngle * TAU) * dist;
    const sy        = cy - 20 + Math.sin(baseAngle * TAU) * dist * 0.6;
    const ss        = p.sparkScale * (2.5 + Math.sin((p.t + k * 0.25) * TAU) * 1.2);

    // glow halo
    ctx.save();
    ctx.globalAlpha = 0.3;
    radialGlow(sx, sy, ss * 3, 'rgba(249,115,22,0.6)', 'rgba(249,115,22,0)');
    ctx.restore();

    // star spark
    star(sx, sy, ss * 2.2, ss * 0.9, 4, C.spark2, baseAngle * TAU);
    star(sx, sy, ss * 1.5, ss * 0.6, 4, C.spark1, baseAngle * TAU + Math.PI / 4);

    // tiny dot center
    ellipse(sx, sy, ss * 0.5, ss * 0.5, '#fff7ed');
  }

  /* ── CYAN ACCENT TRIM on collar glow ── */
  ctx.save();
  ctx.globalAlpha = 0.5;
  radialGlow(cx, cy + 6, 22, 'rgba(6,182,212,0.25)', 'rgba(6,182,212,0)');
  ctx.restore();

  ctx.restore(); // end clip
}

/* ──────────────── RENDER ALL FRAMES ──────────────── */
for (let i = 0; i < N; i++) drawFrame(i);

/* ──────────────── DOWNLOAD ──────────────── */
document.getElementById('dl').addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = 'loopforge-mascot-spritesheet.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});
</script>
</body>
</html>
